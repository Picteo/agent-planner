<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <style>
      .box-start { fill: #8B5CF6; stroke: #6D28D9; stroke-width: 2; rx: 25; }
      .box-process { fill: #3B82F6; stroke: #2563EB; stroke-width: 2; rx: 10; }
      .box-decision { fill: #F59E0B; stroke: #D97706; stroke-width: 2; }
      .box-decision-rh { fill: #F59E0B; stroke: #D97706; stroke-width: 2; }
      .box-end { fill: #10B981; stroke: #059669; stroke-width: 2; rx: 25; }
      .box-info { fill: #6366F1; stroke: #4F46E5; stroke-width: 2; rx: 10; }
      .arrow { stroke: #4B5563; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-yes { stroke: #10B981; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead-green); }
      .arrow-no { stroke: #EF4444; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead-red); }
      .box-text { font-family: 'Segoe UI', -apple-system, sans-serif; fill: white; font-size: 13; }
      .box-text-small { font-family: 'Segoe UI', -apple-system, sans-serif; fill: white; font-size: 11; }
      .shadow { filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.15)); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="#F9FAFB" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#1F2937">🤖 Agent Execution Flow</text>

  <!-- Start: Work Item Ready -->
  <rect x="270" y="50" width="260" height="50" class="box-start shadow"/>
  <text x="400" y="80" text-anchor="middle" class="box-text">📋 Work Item Ready</text>

  <!-- Arrow down -->
  <line x1="400" y1="100" x2="400" y2="120" class="arrow"/>

  <!-- Read Context -->
  <rect x="240" y="120" width="320" height="55" class="box-process shadow"/>
  <text x="400" y="142" text-anchor="middle" class="box-text">📖 Read Context Package</text>
  <text x="400" y="158" class="box-text-small">Parse Agent.Context JSON data</text>

  <!-- Arrow down -->
  <line x1="400" y1="175" x2="400" y2="195" class="arrow"/>

  <!-- Execute Work -->
  <rect x="240" y="195" width="320" height="55" class="box-process shadow"/>
  <text x="400" y="217" text-anchor="middle" class="box-text">⚙️ Execute Work</text>
  <text x="400" y="233" class="box-text-small">Create files, modify code, open PRs</text>

  <!-- Arrow down -->
  <line x1="400" y1="250" x2="400" y2="270" class="arrow"/>

  <!-- Decision: Blocked? -->
  <rect x="280" y="270" width="240" height="55" class="box-decision-rh shadow"/>
  <text x="400" y="292" text-anchor="middle" class="box-text" font-size="14">🚫 Blocked?</text>
  <text x="400" y="310" class="box-text-small">Waiting for answer or resources?</text>

  <!-- NO path: Work Complete -->
  <line x1="520" y1="297" x2="620" y2="297" class="arrow-yes"/>
  <text x="565" y="290" class="label-text" fill="#10B981" font-family="Segoe UI" font-size="11" font-weight="bold">NO</text>

  <!-- Complete box -->
  <rect x="620" y="270" width="150" height="55" class="box-end shadow"/>
  <text x="695" y="292" text-anchor="middle" class="box-text" font-size="12">✅ Work</text>
  <text x="695" y="308" text-anchor="middle" class="box-text" font-size="12">Complete</text>

  <!-- Arrow down from Complete -->
  <line x1="695" y1="325" x2="695" y2="360" class="arrow-yes"/>

  <!-- Add Report -->
  <rect x="610" y="360" width="170" height="50" class="box-info shadow"/>
  <text x="695" y="380" text-anchor="middle" class="box-text" font-size="12">📊 Add Completion</text>
  <text x="695" y="395" text-anchor="middle" class="box-text" font-size="12">Report</text>

  <!-- YES path left -->
  <line x1="280" y1="297" x2="160" y2="297" class="arrow-no"/>
  <text x="215" y="290" fill="#EF4444" font-family="Segoe UI" font-size="11" font-weight="bold">YES</text>

  <!-- Ask Question -->
  <rect x="10" y="270" width="150" height="55" class="box-decision-rh shadow"/>
  <text x="85" y="292" text-anchor="middle" class="box-text" font-size="12">❓ Ask Question</text>
  <text x="85" y="308" class="box-text" font-size="11">via Work Item</text>

  <!-- Arrow up from Ask Question -->
  <line x1="85" y1="270" x2="85" y2="200" class="arrow-no"/>
  <line x1="85" y1="200" x2="240" y2="200" class="arrow-no"/>

  <!-- Wait for Answer -->
  <rect x="10" y="195" width="150" height="55" class="box-process shadow"/>
  <text x="85" y="217" text-anchor="middle" class="box-text" font-size="12">⏳ Wait for Answer</text>
  <text x="85" y="233" class="box-text" font-size="11">Coordinator response</text>

  <!-- Arrow left from Wait to Receive -->
  <line x1="10" y1="222" x2="10" y2="140" class="arrow"/>
  <line x1="10" y1="140" x2="140" y2="140" class="arrow"/>

  <!-- Receive Answer -->
  <rect x="10" y="120" width="150" height="55" class="box-process shadow"/>
  <text x="85" y="142" text-anchor="middle" class="box-text" font-size="12">💬 Receive Answer</text>
  <text x="85" y="158" class="box-text" font-size="11">From coordinator/user</text>

  <!-- Arrow from Receive Answer back to Execute loop -->
  <line x1="160" y1="147" x2="240" y2="147" class="arrow"/>
  <text x="195" y="135" fill="#3B82F6" font-family="Segoe UI" font-size="10" font-weight="bold">continue</text>

</svg>