<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 680" width="900" height="680">
  <defs>
    <style>
      .box-user { fill: #8B5CF6; stroke: #6D28D9; stroke-width: 2; }
      .box-planner { fill: #10B981; stroke: #059669; stroke-width: 2; }
      .box-coordinator { fill: #3B82F6; stroke: #2563EB; stroke-width: 2; }
      .box-agent { fill: #F59E0B; stroke: #D97706; stroke-width: 2; }
      .box-azdo { fill: #6366F1; stroke: #4F46E5; stroke-width: 2; }
      .arrow { stroke: #4B5563; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-blue { stroke: #60A5FA; stroke-width: 2; fill: none; marker-end: url(#arrowhead-blue); }
      .arrow-green { stroke: #34D399; stroke-width: 2; fill: none; marker-end: url(#arrowhead-green); }
      .arrow-amber { stroke: #FBBF24; stroke-width: 2; fill: none; marker-end: url(#arrowhead-amber); }
      .label { font-family: 'Segoe UI', -apple-system, sans-serif; fill: #4B5563; font-size: 12; }
      .title { font-family: 'Segoe UI', -apple-system, sans-serif; fill: #1F2937; font-size: 14; font-weight: bold; }
      .box-text { font-family: 'Segoe UI', -apple-system, sans-serif; fill: white; font-size: 14; }
      .box-text-small { font-family: 'Segoe UI', -apple-system, sans-serif; fill: white; font-size: 11; }
      .shadow { filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.15)); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60A5FA"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34D399"/>
    </marker>
    <marker id="arrowhead-amber" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FBBF24"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="680" fill="#F9FAFB"/>

  <!-- Azure DevOps Layer -->
  <rect x="80" y="380" width="740" height="260" rx="16" fill="#EEF2FF" stroke="#C7D2FE" stroke-width="2"/>
  <text x="450" y="410" text-anchor="middle" class="title" fill="#4F46E5">☁️ Azure DevOps Layer</text>

  <!-- AzDO Work Items Box -->
  <rect x="110" y="430" width="320" height="190" rx="10" class="box-azdo shadow"/>
  <text x="270" y="460" text-anchor="middle" class="box-text">📦 Work Items</text>
  <text x="125" y="482" class="box-text-small">• Task / Bug work items</text>
  <text x="125" y="500" class="box-text-small">• State machine coordination</text>
  <text x="125" y="518" class="box-text-small">• Agent.Context field</text>
  <text x="125" y="536" class="box-text-small">• Agent.State field</text>
  <text x="125" y="554" class="box-text-small">• Planner.MaturityScore</text>
  <text x="125" y="572" class="box-text-small">• Custom fields for</text>
  <text x="125" y="586" class="box-text-small">  agent coordination</text>

  <!-- AzDO Sprints Box -->
  <rect x="470" y="430" width="320" height="190" rx="10" class="box-azdo shadow"/>
  <text x="630" y="460" text-anchor="middle" class="box-text">📅 Sprints</text>
  <text x="485" y="482" class="box-text-small">• Auto-created per week</text>
  <text x="485" y="500" class="box-text-small">• Format: Sprint YYYY-Www</text>
  <text x="485" y="518" class="box-text-small">• Examples:</text>
  <text x="500" y="536" class="box-text-small">  - Sprint 2026-W29</text>
  <text x="500" y="554" class="box-text-small">  - Sprint 2026-W30</text>
  <text x="485" y="576" class="box-text-small">• Planner assigns work</text>
  <text x="485" y="590" class="box-text-small">  items to sprints</text>

  <!-- User Layer -->
  <rect x="310" y="20" width="280" height="80" rx="40" class="box-user shadow"/>
  <text x="450" y="50" text-anchor="middle" class="box-text" font-size="16">👤 User</text>
  <text x="450" y="70" text-anchor="middle" class="box-text-small">Describes work • Approves plans</text>

  <!-- Planner Layer -->
  <rect x="60" y="140" width="780" height="120" rx="12" class="box-planner shadow"/>
  <text x="450" y="168" text-anchor="middle" class="box-text" font-size="16">🎯 OrchestratorPlanner</text>
  <text x="450" y="190" text-anchor="middle" class="box-text-small">1. Receives user request → 2. Asks targeted questions → 3. Creates AzDO work item with context</text>
  <text x="450" y="210" text-anchor="middle" class="box-text-small">4. Self-assesses maturity (1-5) → 5. If score < 4: asks more → 6. If score ≥ 4: releases to Ready</text>

  <!-- Coordinator Layer -->
  <rect x="60" y="300" width="780" height="55" rx="10" class="box-coordinator shadow"/>
  <text x="450" y="328" text-anchor="middle" class="box-text" font-size="15">📋 OrchestratorCoordinator — Monitors work items, dispatches to agents, answers questions</text>

  <!-- Agents Layer -->
  <rect x="60" y="430" width="230" height="90" rx="10" class="box-agent shadow"/>
  <text x="175" y="455" text-anchor="middle" class="box-text" font-size="14">🤖 Agent #1</text>
  <text x="175" y="475" text-anchor="middle" class="box-text-small">VS Code + Cline</text>
  <text x="175" y="495" text-anchor="middle" class="box-text-small">Execute work autonomously</text>

  <rect x="335" y="430" width="230" height="90" rx="10" class="box-agent shadow"/>
  <text x="450" y="455" text-anchor="middle" class="box-text" font-size="14">🤖 Agent #2</text>
  <text x="450" y="475" text-anchor="middle" class="box-text-small">VS Code + Cline</text>
  <text x="450" y="495" text-anchor="middle" class="box-text-small">Execute work autonomously</text>

  <rect x="610" y="430" width="230" height="90" rx="10" class="box-agent shadow"/>
  <text x="725" y="455" text-anchor="middle" class="box-text" font-size="14">🤖 Agent #N</text>
  <text x="725" y="475" text-anchor="middle" class="box-text-small">VS Code + Cline</text>
  <text x="725" y="495" text-anchor="middle" class="box-text-small">Execute work autonomously</text>

  <!-- Arrows -->
  <!-- User to Planner -->
  <line x1="450" y1="100" x2="450" y2="140" class="arrow"/>
  <text x="465" y="125" class="label">Describes work</text>

  <!-- Planner to AzDO -->
  <line x1="450" y1="260" x2="270" y2="430" class="arrow-green"/>
  <text x="370" y="330" class="label" fill="#059669">Creates work item</text>

  <!-- AzDO to Coordinator -->
  <line x1="270" y1="430" x2="450" y2="355" class="arrow-blue"/>
  <text x="340" y="400" class="label" fill="#2563EB">Ready work item</text>

  <!-- Coordinator to Agents -->
  <line x1="350" y1="355" x2="175" y2="430" class="arrow-amber"/>
  <line x1="450" y1="355" x2="450" y2="430" class="arrow-amber"/>
  <line x1="550" y1="355" x2="725" y2="430" class="arrow-amber"/>
  <text x="260" y="400" class="label" fill="#D97706">Dispatches</text>

  <!-- Agents back to AzDO (state updates) -->
  <line x1="175" y1="520" x2="200" y2="620" class="arrow"/>
  <line x1="200" y1="620" x2="450" y2="620" class="arrow"/>
  <line x1="450" y1="620" x2="450" y2="640" class="arrow"/>
  <text x="310" y="635" class="label">Updates state</text>

  <!-- Agent question to Coordinator -->
  <line x1="175" y1="430" x2="100" y2="370" class="arrow"/>
  <line x1="100" y1="370" x2="300" y2="355" class="arrow"/>
  <text x="110" y="395" class="label">Asks question</text>

</svg>