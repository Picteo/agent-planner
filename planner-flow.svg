<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <style>
      .box-input { fill: #8B5CF6; stroke: #6D28D9; stroke-width: 2; }
      .box-process { fill: #3B82F6; stroke: #2563EB; stroke-width: 2; }
      .box-decision { fill: #F59E0B; stroke: #D97706; stroke-width: 2; }
      .box-output { fill: #10B981; stroke: #059669; stroke-width: 2; }
      .arrow { stroke: #4B5563; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .arrow-yes { stroke: #10B981; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead-green); }
      .arrow-no { stroke: #EF4444; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead-red); }
      .label-text { font-family: 'Segoe UI', -apple-system, sans-serif; font-size: 11; font-weight: bold; }
      .box-text { font-family: 'Segoe UI', -apple-system, sans-serif; fill: white; font-size: 13; }
      .box-text-small { font-family: 'Segoe UI', -apple-system, sans-serif; fill: white; font-size: 11; }
      .shadow { filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.15)); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4B5563"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10B981"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="#F9FAFB" rx="12"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="18" font-weight="bold" fill="#1F2937">🎯 Planner Internal Flow</text>

  <!-- Start: User Request -->
  <rect x="280" y="55" width="240" height="55" rx="27" class="box-input shadow"/>
  <text x="400" y="77" text-anchor="middle" class="box-text">📥 User Request</text>
  <text x="400" y="95" text-anchor="middle" class="box-text-small">"Create a new task/work item"</text>

  <!-- Arrow to decision -->
  <line x1="400" y1="110" x2="400" y2="138" class="arrow"/>

  <!-- Decision: Context Complete? -->
  <rect x="250" y="138" width="300" height="70" rx="10" class="box-decision shadow"/>
  <text x="400" y="163" text-anchor="middle" class="box-text" font-size="14">❓ Context Complete?</text>
  <text x="400" y="182" text-anchor="middle" class="box-text-small">All required information present?</text>

  <!-- NO path: Ask Questions -->
  <line x1="250" y1="173" x2="130" y2="173" class="arrow-no"/>
  <line x1="130" y1="173" x2="130" y2="260" class="arrow-no"/>
  <line x1="130" y1="260" x2="250" y2="260" class="arrow-no"/>
  <text x="185" y="165" class="label-text" fill="#EF4444">NO</text>

  <!-- Ask Questions box -->
  <rect x="30" y="260" width="200" height="70" rx="10" class="box-process shadow"/>
  <text x="130" y="285" text-anchor="middle" class="box-text">❔ Ask Targeted Questions</text>
  <text x="130" y="303" class="box-text-small">Fill in missing context</text>
  <text x="130" y="321" class="box-text-small">gaps iteratively</text>

  <!-- Arrow back to decision -->
  <line x1="230" y1="295" x2="250" y2="295" class="arrow"/>
  <line x1="250" y1="295" x2="250" y2="208" class="arrow"/>
  <text x="255" y="255" class="label-text" fill="#3B82F6">iterate</text>

  <!-- YES path: Create Work Item -->
  <line x1="400" y1="208" x2="400" y2="250" class="arrow-yes"/>
  <text x="415" y="235" class="label-text" fill="#10B981">YES</text>

  <!-- Create Work Item box -->
  <rect x="260" y="250" width="280" height="70" rx="10" class="box-process shadow"/>
  <text x="400" y="275" text-anchor="middle" class="box-text">📝 Create AzDO Work Item</text>
  <text x="400" y="293" class="box-text-small">Fill Agent.Context with</text>
  <text x="400" y="311" class="box-text-small">structured data package</text>

  <!-- Arrow to maturity assessment -->
  <line x1="400" y1="320" x2="400" y2="348" class="arrow"/>

  <!-- Assess Maturity -->
  <rect x="260" y="348" width="280" height="70" rx="10" class="box-process shadow"/>
  <text x="400" y="373" text-anchor="middle" class="box-text">📊 Assess Maturity Score</text>
  <text x="400" y="391" class="box-text-small">Evaluate against 8-hour</text>
  <text x="400" y="409" class="box-text-small">autonomy checklist (1-5)</text>

  <!-- Arrow to decision -->
  <line x1="400" y1="418" x2="400" y2="446" class="arrow"/>

  <!-- Decision: Score >= 4? -->
  <rect x="300" y="446" width="200" height="50" rx="25" class="box-decision shadow"/>
  <text x="400" y="476" text-anchor="middle" class="box-text" font-size="13">🎯 Score ≥ 4?</text>

  <!-- NO path: Gather More Details -->
  <line x1="300" y1="471" x2="180" y2="471" class="arrow-no"/>
  <text x="235" y="463" class="label-text" fill="#EF4444">NO</text>

  <!-- Arrow up from Gather More to decision loop -->
  <line x1="180" y1="471" x2="180" y2="395" class="arrow-no"/>
  <line x1="180" y1="395" x2="260" y2="395" class="arrow-no"/>
  <text x="195" y="440" class="label-text" fill="#EF4444">loop</text>

  <!-- YES path: Release to Ready -->
  <line x1="500" y1="471" x2="620" y2="471" class="arrow-yes"/>
  <text x="555" y="463" class="label-text" fill="#10B981">YES</text>

  <!-- Output: Release to Ready -->
  <rect x="620" y="446" width="160" height="50" rx="25" class="box-output shadow"/>
  <text x="700" y="476" text-anchor="middle" class="box-text" font-size="13">✅ Release to Ready</text>

</svg>